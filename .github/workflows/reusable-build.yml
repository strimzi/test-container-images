name: Reusable Build

on:
  workflow_call:
    inputs:
      containerTag:
        description: 'Container image tag'
        required: false
        type: string
        default: 'latest'
    secrets:
      QUAY_USER:
        required: false
      QUAY_PASS:
        required: false

# Declare default permissions as read only
permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Kafka Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build/prepare-kafka
        with:
          runnerArch: "amd64"
          artifactSuffix: "test-container-images"

  build-containers:
    name: Build Containers
    needs:
      - prepare
    strategy:
      matrix:
        architecture:
          - amd64
          - arm64
          - s390x
          - ppc64le
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: strimzi/github-actions/.github/actions/dependencies/install-docker@v1

      - uses: strimzi/github-actions/.github/actions/build/build-containers@v1
        with:
          architecture: ${{ matrix.architecture }}
          artifactSuffix: "test-container-images"
          containerRegistry: "quay.io"
          containerOrg: "strimzi-test-container"
          containerTag: ${{ inputs.containerTag }}
          imagesDir: "./container-archives"

  push-containers:
    name: Push Containers
    needs:
      - build-containers
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-') }}
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: strimzi/github-actions/.github/actions/dependencies/install-docker@v1

      - uses: strimzi/github-actions/.github/actions/dependencies/install-syft@v1

      - uses: strimzi/github-actions/.github/actions/build/push-containers@v1
        with:
          architectures: "amd64,arm64,ppc64le,s390x"
          containerRegistry: "quay.io"
          containerOrg: "strimzi-test-container"
          containerTag: ${{ inputs.containerTag }}
          registryUser: ${{ secrets.QUAY_USER }}
          registryPassword: ${{ secrets.QUAY_PASS }}
          artifactSuffix: "test-container-images"

name: Build

on:
  push:
    branches:
      - "main"
      - "release-*"
    tags:
      - "*"
  pull_request:
    branches:
      - "*"

# Declare default permissions as read only
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      containerTag: "latest"
      pushContainers: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
    secrets:
      QUAY_USER: ${{ secrets.QUAY_USER }}
      QUAY_PASS: ${{ secrets.QUAY_PASS }}

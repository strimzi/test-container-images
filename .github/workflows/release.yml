name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release Version (e.g., 0.116.0 for GA or 0.116.0-rc1 for RC)'
        required: true
        type: string

# Declare default permissions as read only
permissions:
  contents: read
  id-token: write

jobs:
  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      containerTag: ${{ inputs.releaseVersion }}
    secrets:
      QUAY_USER: ${{ secrets.QUAY_USER }}
      QUAY_PASS: ${{ secrets.QUAY_PASS }}
